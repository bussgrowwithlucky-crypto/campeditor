# Render Blueprint — declarative deploy config.
# https://render.com/docs/blueprint-spec
#
# Apply from the Render dashboard:
#   New → Blueprint → connect the GitHub repo → Apply.
# Render reads this file and provisions everything below.
#
# Vision + text + transcription all go through cloud APIs (byNara router
# + Groq Whisper). No local models, no Ollama, no faster-whisper on the
# server. The image stays small and the free tier can actually run it.

services:
  - type: web
    name: campeditor
    runtime: docker
    plan: free             # 750 CPU-hours/month, sleeps after 15 min idle
    region: oregon         # change to your nearest region
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true       # redeploy on every push to main
    healthCheckPath: /api/health
    # Render sets $PORT automatically; our start.sh reads it.
    # NOTE: persistent disks are NOT supported on the free tier. The
    # B-roll library cache and library index will rebuild on every
    # redeploy (~5 min one-time vision cost for 290 clips). To keep the
    # cache across redeploys, upgrade to Starter ($7/mo) or higher and
    # uncomment the disk block below.
    #
    # disk:
    #   name: campeditor-data
    #   mountPath: /app/data
    #   sizeGB: 5
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # ---- byNara Router — Vision + Text (primary) ----
      # Token-Plan key drives BOTH text and vision rungs from one base URL.
      # Telegram-gated: link Telegram + join required channels at
      # https://router.bynara.id/settings, or the key 403s with
      # "telegram_required". Set the values in the Render dashboard
      # (sync: false keeps them out of the repo).
      - key: LLM_BASE_URL
        value: https://router.bynara.id/v1
        sync: false
      - key: LLM_MODEL
        value: mistral-large
      - key: LLM_VISION_MODEL
        value: mistral-medium-3-5
      # ---- Groq — Whisper transcription ----
      # Transcription is the only non-byNara model in the deploy. The
      # whisper-large-v3-turbo endpoint on Groq is API-only (no local
      # weights, no faster-whisper).
      - key: GROQ_TRANSCRIPTION_MODEL
        value: whisper-large-v3-turbo
      # ---- Intelligent selector v2 knobs (defaults match SPEC §12) ----
      - key: CAMPEDITOR_INTELLIGENT_CINEMA_FLOOR
        value: "0.18"
      - key: CAMPEDITOR_INTELLIGENT_CONTINUITY_PENALTY_MAX
        value: "-0.08"
      - key: CAMPEDITOR_INTELLIGENT_CONTINUITY_COSINE_THRESHOLD
        value: "0.92"